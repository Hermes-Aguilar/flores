<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <title>FLORES</title>

  <style>
    *,*::after,*::before{padding:0;margin:0;box-sizing:border-box;}

    :root {
      --dark-color: #000000;
      --neon-pink: #ff1a8c;
      --neon-orange: #ff6a00;
      --neon-green: #39ff14;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--dark-color);
      overflow: hidden;
      perspective: 1000px;
    }

    /* =============================================
       FONDO NOCTURNO
    ============================================= */
    .night {
      position: fixed;
      left: 50%; top: 0;
      transform: translateX(-50%);
      width: 100%; height: 100%;
      filter: blur(0.1vmin);
      background-image:
        radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
        radial-gradient(ellipse at bottom, var(--dark-color), rgba(100,149,237,0.15)),
        repeating-linear-gradient(220deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
        repeating-linear-gradient(189deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
        repeating-linear-gradient(148deg,rgb(0,0,0) 0px,rgb(0,0,0) 19px,transparent 19px,transparent 22px),
        linear-gradient(90deg,rgb(21,255,0),rgb(240,240,240));
    }

    /* =============================================
       JARDÍN DE FONDO — tulipanes pequeños borrosos
    ============================================= */
    .bg-garden {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 60%;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
      pointer-events: none;
    }

    .bg-tulip {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center;
      filter: blur(1.5px);
      opacity: 0.45;
    }

    /* Tallo fondo */
    .bg-tulip__stem {
      width: 3px;
      background: linear-gradient(to top, #0d3a08, #2e7a20);
      margin: 0 auto;
      border-radius: 2px;
    }

    /* Copa fondo */
    .bg-tulip__cup {
      position: relative;
      width: 20px;
      margin: 0 auto;
    }
    .bg-tulip__petal {
      position: absolute;
      bottom: 0;
      width: 12px;
      height: 22px;
      border-radius: 50% 50% 30% 30% / 60% 60% 20% 20%;
      opacity: 0.9;
    }
    .bg-tulip__petal--1 { left: 50%; transform: translate(-10%,  2%) rotateY(40deg) rotateX(-50deg); }
    .bg-tulip__petal--2 { left: 50%; transform: translate(-50%, -4%) rotateX(40deg); }
    .bg-tulip__petal--3 { left: 50%; transform: translate(-90%,  0%) rotateY(45deg) rotateX(50deg); }

    /* =============================================
       TEXTO TÍTULO
    ============================================= */
.title {
  position: fixed;
  top: 3vmin;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  width: min(90vw, 160vmin);
  text-align: justify;
  font-family: 'Playfair Display', serif;
  font-size: clamp(1rem, 2.6vw, 2.2rem);
  font-weight: 700;
  font-style: italic;
  letter-spacing: 0.05em;
  line-height: 1.3;
  color: #fdf6e3;
  text-shadow:
    0 0 12px #f5c842aa,
    0 0 40px #f5c84255;
  animation: title-flicker 3s infinite;
  padding: 0 1rem;
  box-sizing: border-box;
}
    @keyframes title-flicker {
      0%,100%{opacity:1; text-shadow: 0 0 10px var(--neon-pink),0 0 30px var(--neon-pink),0 0 60px rgba(255,26,140,0.4);}
      92%{opacity:1;}
      93%{opacity:0.6;}
      94%{opacity:1;}
      96%{opacity:0.8;}
      97%{opacity:1;}
    }

    /* =============================================
       FLORES PRINCIPALES — contenedor
    ============================================= */
    .flowers {
      position: relative;
      transform: scale(0.9);
      z-index: 10;
    }

    /* =============================================
       FLOR BASE
    ============================================= */
    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: 0.8s;
    }

    /* ---- Flower 1 (izquierda) ---- */
    .flower--1 { animation: moving-flower-1 4s linear infinite; }
    .flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
    .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
    .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 1.2s backwards; }
    .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.0s backwards; }
    .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left  var(--fl-speed) 2.0s backwards; }

    /* ---- Flower 2 (centro-derecha) ---- */
    .flower--2 { left:50%; transform:rotate(20deg); animation:moving-flower-2 4s linear infinite; }
    .flower--2 .flower__line { height:60vmin; animation-delay:0.6s; }
    .flower--2 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 1.9s backwards; }
    .flower--2 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 1.7s backwards; }
    .flower--2 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.5s backwards; }
    .flower--2 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.3s backwards; }

    /* ---- Flower 3 (derecha) ---- */
    .flower--3 { left:50%; transform:rotate(-15deg); animation:moving-flower-3 4s linear infinite; }
    .flower--3 .flower__line { animation-delay:0.9s; }
    .flower--3 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 2.5s backwards; }
    .flower--3 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 2.3s backwards; }
    .flower--3 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 2.1s backwards; }
    .flower--3 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.9s backwards; }

    /* ---- Flower 4 (extra izquierda) ---- */
    .flower--4 { left:-28%; transform:rotate(-8deg); animation:moving-flower-1 4.5s linear infinite; }
    .flower--4 .flower__line { height:55vmin; animation-delay:0.4s; }
    .flower--4 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--4 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--4 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.4s backwards; }
    .flower--4 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.2s backwards; }

    /* ---- Flower 5 (extra derecha) ---- */
    .flower--5 { left:72%; transform:rotate(10deg); animation:moving-flower-2 5s linear infinite; }
    .flower--5 .flower__line { height:65vmin; animation-delay:0.7s; }
    .flower--5 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 2.0s backwards; }
    .flower--5 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--5 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.6s backwards; }
    .flower--5 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.4s backwards; }

    /* ---- Flower 6 (centro pequeña) ---- */
    .flower--6 { left:22%; transform:rotate(5deg) scale(0.8); animation:moving-flower-3 3.5s linear infinite; }
    .flower--6 .flower__line { height:50vmin; animation-delay:1.0s; }
    .flower--6 .flower__line__leaf--1 { animation:blooming-leaf-right var(--fl-speed) 2.2s backwards; }
    .flower--6 .flower__line__leaf--2 { animation:blooming-leaf-right var(--fl-speed) 2.0s backwards; }
    .flower--6 .flower__line__leaf--3 { animation:blooming-leaf-left  var(--fl-speed) 1.8s backwards; }
    .flower--6 .flower__line__leaf--4 { animation:blooming-leaf-left  var(--fl-speed) 1.6s backwards; }

    /* =============================================
       CÁLIZ — con contorno boceto neon
    ============================================= */
    .flower__leafs {
      position: relative;
      animation: blooming-flower 2s backwards;
    }
    .flower__leafs--1 { animation-delay:1.1s; }
    .flower__leafs--2 { animation-delay:1.4s; }
    .flower__leafs--3 { animation-delay:1.7s; }
    .flower__leafs--4 { animation-delay:1.0s; }
    .flower__leafs--5 { animation-delay:1.5s; }
    .flower__leafs--6 { animation-delay:1.9s; }

    .flower__leafs::after {
      content:"";
      position:absolute;
      left:0; top:0;
      transform:translate(-50%,-100%);
      width:8vmin; height:8vmin;
      background-color:#24eb56;
      filter:blur(10vmin);
    }

    /* =============================================
       PÉTALOS — estilo boceto con borde neon
    ============================================= */
    .flower__leaf {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 7vmin;
      height: 14vmin;
      border-radius: 50% 50% 34% 34% / 60% 60% 20% 20%;
      transform-origin: bottom center;
      opacity: 0.93;
    }

    /* Colores neon estilo boceto */

    /* FLOR 1 — ROSA/MAGENTA neon */
    .flower--1 .flower__leaf--1,
    .flower--1 .flower__leaf--2,
    .flower--1 .flower__leaf--3 {
      background-image: linear-gradient(to top, #8b0050, #e8006b, #ff1a8c);
      box-shadow:
        0 0 4px #ff1a8c,
        0 0 12px rgba(255,26,140,0.6),
        inset 0 0 8px rgba(255,26,140,0.3);
      outline: 1.5px solid rgba(255,100,180,0.7);
    }
    .flower--1 .flower__leaf--4 {
      background-image: linear-gradient(to top, #b89000, #ffe066);
      box-shadow: 0 0 6px var(--neon-orange), inset 0 0 4px rgba(255,180,0,0.4);
      outline: 1px solid rgba(255,180,0,0.6);
    }

    /* FLOR 2 — AMARILLA neon */
    .flower--2 .flower__leaf--1,
    .flower--2 .flower__leaf--2,
    .flower--2 .flower__leaf--3 {
      background-image: linear-gradient(to top, #8a5a00, #f0b800, #ffe44d);
      box-shadow:
        0 0 4px #ffe44d,
        0 0 14px rgba(255,220,0,0.5),
        inset 0 0 8px rgba(255,220,0,0.2);
      outline: 1.5px solid rgba(255,230,0,0.7);
    }
    .flower--2 .flower__leaf--4 {
      background-image: linear-gradient(to top, #c89000, #fff176);
      box-shadow: 0 0 5px #fff176, inset 0 0 4px rgba(255,240,0,0.3);
      outline: 1px solid rgba(255,240,0,0.5);
    }

    /* FLOR 3 — ROJA neon */
    .flower--3 .flower__leaf--1,
    .flower--3 .flower__leaf--2,
    .flower--3 .flower__leaf--3 {
      background-image: linear-gradient(to top, #7a0000, #e8001a, #ff4444);
      box-shadow:
        0 0 4px #ff4444,
        0 0 14px rgba(255,50,50,0.6),
        inset 0 0 8px rgba(255,50,50,0.25);
      outline: 1.5px solid rgba(255,80,80,0.7);
    }
    .flower--3 .flower__leaf--4 {
      background-image: linear-gradient(to top, #c89000, #ffe066);
      box-shadow: 0 0 5px var(--neon-orange);
      outline: 1px solid rgba(255,180,0,0.5);
    }

    /* FLOR 4 — BLANCA/CYAN neon */
    .flower--4 .flower__leaf--1,
    .flower--4 .flower__leaf--2,
    .flower--4 .flower__leaf--3 {
      background-image: linear-gradient(to top, #006070, #00ccdd, #e0faff);
      box-shadow:
        0 0 4px #00eeff,
        0 0 14px rgba(0,200,230,0.5),
        inset 0 0 8px rgba(0,200,230,0.2);
      outline: 1.5px solid rgba(0,220,255,0.7);
    }
    .flower--4 .flower__leaf--4 {
      background-image: linear-gradient(to top, #b89000, #ffe066);
      box-shadow: 0 0 5px var(--neon-orange);
      outline: 1px solid rgba(255,180,0,0.5);
    }

    /* FLOR 5 — MORADA neon */
    .flower--5 .flower__leaf--1,
    .flower--5 .flower__leaf--2,
    .flower--5 .flower__leaf--3 {
      background-image: linear-gradient(to top, #3a0070, #9900cc, #dd66ff);
      box-shadow:
        0 0 4px #cc44ff,
        0 0 14px rgba(180,0,255,0.5),
        inset 0 0 8px rgba(180,0,255,0.2);
      outline: 1.5px solid rgba(200,50,255,0.7);
    }
    .flower--5 .flower__leaf--4 {
      background-image: linear-gradient(to top, #b89000, #ffe066);
      box-shadow: 0 0 5px var(--neon-orange);
      outline: 1px solid rgba(255,180,0,0.5);
    }

    /* FLOR 6 — NARANJA neon */
    .flower--6 .flower__leaf--1,
    .flower--6 .flower__leaf--2,
    .flower--6 .flower__leaf--3 {
      background-image: linear-gradient(to top, #7a2200, #e85000, #ff8c00);
      box-shadow:
        0 0 4px #ff8c00,
        0 0 14px rgba(255,120,0,0.5),
        inset 0 0 8px rgba(255,120,0,0.2);
      outline: 1.5px solid rgba(255,140,0,0.8);
    }
    .flower--6 .flower__leaf--4 {
      background-image: linear-gradient(to top, #c89000, #ffe066);
      box-shadow: 0 0 5px var(--neon-orange);
      outline: 1px solid rgba(255,180,0,0.5);
    }

    /* =============================================
       POSICIÓN DE LOS PÉTALOS
    ============================================= */
    .flower__leaf--1 { transform:translate(-10%, 1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2 { transform:translate(-50%,-4%) rotateX(40deg); }
    .flower__leaf--3 { transform:translate(-90%, 0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4 {
      width:7vmin; height:7vmin;
      transform-origin: bottom left;
      border-radius: 4vmin 10vmin 4vmin 4vmin;
      transform: translate(0%,18%) rotateX(70deg) rotate(-43deg);
      z-index:1; opacity:0.8;
    }

    /* =============================================
       CÍRCULO CENTRAL (pistilo)
    ============================================= */
    .flower__white-circle {
      position:absolute;
      left:-3.5vmin; top:-3vmin;
      width:9vmin; height:4vmin;
      border-radius:50%;
      background-color:#ffffff;
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }
    .flower__white-circle::after {
      content:"";
      position:absolute;
      left:50%; top:45%;
      transform:translate(-50%,-50%);
      width:60%; height:60%;
      border-radius:inherit;
      background-image:linear-gradient(90deg,rgb(190,133,0),rgb(190,133,0));
    }

    /* =============================================
       TALLO — con borde neon
    ============================================= */
    .flower__line {
      height: 55vmin;
      width: 1.5vmin;
      background-image:
        linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.08)),
        linear-gradient(to top, transparent 5%, #1e5c14, #2e7a20);
      box-shadow:
        inset 0 0 2px rgba(0,0,0,0.5),
        0 0 3px rgba(57,255,20,0.4);
      animation: grow-flower-tree 4s backwards;
    }

    /* =============================================
       HOJAS DEL TALLO
    ============================================= */
    .flower__line__leaf {
      --w: 10vmin;
      --h: calc(var(--w) + 6vmin);
      position:absolute;
      top:20%; left:90%;
      width:var(--w); height:var(--h);
      border-top-right-radius:var(--h);
      border-bottom-left-radius:2vmin;
      background-image:linear-gradient(to top,rgba(15,50,8,0.5),#2e7a20,#3d9428);
      box-shadow: 0 0 3px rgba(57,255,20,0.3);
    }
    .flower__line__leaf--1 { top:25%; transform:rotate(65deg) rotateY(30deg); }
    .flower__line__leaf--2 { top:50%; transform:rotate(65deg) rotateY(30deg); }
    .flower__line__leaf--3,.flower__line__leaf--4,.flower__line__leaf--6 {
      border-top-right-radius:0; border-bottom-left-radius:0;
      border-top-left-radius:var(--h); border-bottom-right-radius:2vmin;
      left:-680%; top:18%;
      transform:rotate(-65deg) rotateY(30deg);
    }
    .flower__line__leaf--4 { top:43%; }
    .flower__line__leaf--5 { top:2%; transform-origin:left; transform:rotate(65deg) rotateY(30deg) scale(0.7); }
    .flower__line__leaf--6 { top:0%; left:-660%; transform-origin:right; transform:rotate(-65deg) rotateY(30deg) scale(0.7); }

    /* =============================================
       PARTÍCULAS DE LUZ
    ============================================= */
    .flower__light {
      position:absolute;
      bottom:0; width:1vmin; height:1vmin;
      border-radius:50%;
      filter:blur(0.2vmin);
      animation:light-ans 4s linear infinite backwards;
    }
    .flower__light:nth-child(odd) { background-color:#ff1a8c; }
    .flower__light:nth-child(even) { background-color:#ff8c00; }
    .flower__light--1 { left:-2vmin; animation-delay:1.0s; }
    .flower__light--2 { left: 3vmin; animation-delay:0.5s; }
    .flower__light--3 { left:-6vmin; animation-delay:0.3s; }
    .flower__light--4 { left: 6vmin; animation-delay:0.9s; }
    .flower__light--5 { left:-1vmin; animation-delay:1.5s; }
    .flower__light--6 { left:-4vmin; animation-delay:3.0s; }
    .flower__light--7 { left: 3vmin; animation-delay:2.0s; }
    .flower__light--8 { left:-6vmin; animation-delay:3.5s; }

    /* =============================================
       PASTO
    ============================================= */
    .flower__grass {
      --c:#163d12;
      --line-w:1.5vmin;
      position:absolute;
      bottom:12vmin; left:-7vmin;
      display:flex; flex-direction:column; align-items:flex-end;
      z-index:20;
      transform-origin:bottom center;
      transform:rotate(-48deg) rotateY(40deg);
    }
    .flower__grass--1 { animation:moving-grass 2s linear infinite; }
    .flower__grass--2 {
      left:2vmin; bottom:10vmin;
      transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
      opacity:0.55; z-index:0;
      animation:moving-grass--2 1.5s linear infinite;
    }
    .flower__grass--top {
      width:7vmin; height:10vmin;
      border-top-right-radius:100%;
      border-right:var(--line-w) solid var(--c);
      transform-origin:bottom center;
      transform:rotate(-2deg);
    }
    .flower__grass--bottom {
      margin-top:-2px;
      width:var(--line-w); height:25vmin;
      background-image:linear-gradient(to top,transparent,var(--c));
    }
    .flower__grass__leaf {
      --size:10vmin;
      position:absolute;
      width:calc(var(--size)*2.1); height:var(--size);
      border-top-left-radius:var(--size); border-top-right-radius:var(--size);
      background-image:linear-gradient(to top,transparent,transparent 30%,var(--c));
      z-index:100;
    }
    .flower__grass__leaf--1{top:-6%;left:30%;--size:6vmin;transform:rotate(-20deg);animation:growing-grass-ans--1 2s 2.6s backwards;}
    .flower__grass__leaf--2{top:-5%;left:-110%;--size:6vmin;transform:rotate(10deg);animation:growing-grass-ans--2 2s 2.4s linear backwards;}
    .flower__grass__leaf--3{top:5%;left:60%;--size:8vmin;transform:rotate(-18deg) rotateX(-20deg);animation:growing-grass-ans--3 2s 2.2s linear backwards;}
    .flower__grass__leaf--4{top:6%;left:-135%;--size:8vmin;transform:rotate(2deg);animation:growing-grass-ans--4 2s 2s linear backwards;}
    .flower__grass__leaf--5{top:20%;left:60%;--size:10vmin;transform:rotate(-24deg) rotateX(-20deg);animation:growing-grass-ans--5 2s 1.8s linear backwards;}
    .flower__grass__leaf--6{top:22%;left:-180%;--size:10vmin;transform:rotate(10deg);animation:growing-grass-ans--6 2s 1.6s linear backwards;}
    .flower__grass__leaf--7{top:39%;left:70%;--size:10vmin;transform:rotate(-10deg);animation:growing-grass-ans--7 2s 1.4s linear backwards;}
    .flower__grass__leaf--8{top:40%;left:-215%;--size:11vmin;transform:rotate(10deg);animation:growing-grass-ans--8 2s 1.2s linear backwards;}

    @keyframes growing-grass-ans--1{0%{transform-origin:bottom left;transform:rotate(-20deg) scale(0);}}
    @keyframes growing-grass-ans--2{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0);}}
    @keyframes growing-grass-ans--3{0%{transform-origin:bottom left;transform:rotate(-18deg) rotateX(-20deg) scale(0);}}
    @keyframes growing-grass-ans--4{0%{transform-origin:bottom right;transform:rotate(2deg) scale(0);}}
    @keyframes growing-grass-ans--5{0%{transform-origin:bottom left;transform:rotate(-24deg) rotateX(-20deg) scale(0);}}
    @keyframes growing-grass-ans--6{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0);}}
    @keyframes growing-grass-ans--7{0%{transform-origin:bottom left;transform:rotate(-10deg) scale(0);}}
    @keyframes growing-grass-ans--8{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0);}}

    .flower__grass__overlay {
      position:absolute; top:-10%; right:0%;
      width:100%; height:100%;
      background-color:rgba(0,0,0,0.72);
      filter:blur(1.5vmin); z-index:100;
    }

    /* =============================================
       PLANTA LARGA CENTRAL
    ============================================= */
    .flower__g-long {
      --w:2vmin; --h:6vmin; --c:#163d12;
      position:absolute; bottom:10vmin; left:-3vmin;
      transform-origin:bottom center;
      transform:rotate(-30deg) rotateY(-20deg);
      display:flex; flex-direction:column; align-items:flex-end;
      animation:flower-g-long-ans 3s linear infinite;
    }
    .flower__g-long__top {
      top:calc(var(--h)*-1);
      width:calc(var(--w)+1vmin); height:var(--h);
      border-top-right-radius:100%;
      border-right:0.7vmin solid var(--c);
      transform:translate(-0.7vmin,1vmin);
    }
    .flower__g-long__bottom {
      width:var(--w); height:50vmin;
      transform-origin:bottom center;
      background-image:linear-gradient(to top,transparent 30%,var(--c));
      box-shadow:inset 0 0 2px rgba(0,0,0,0.5);

       HOJITAS FRONTALES
    ============================================= */

      position:absolute; bottom:6vmin; left:2.5vmin;

      transform:rotate(-28deg) rotateY(30deg) scale(1.04);
      animation:flower__g-front-ans 2s linear infinite;

    .flower__g-front__line {
      width:0.3vmin; height:20vmin;
      background-image:linear-gradient(to top,transparent,#2e7a20,transparent 100%);

      position:absolute; top:0; left:0;
      transform-origin:bottom left;
      transform:rotate(10deg);

    .flower__g-front__leaf-wrapper:nth-child(odd){animation:flower__g-front__leaf-ans 1s ease-in backwards;}

    .flower__g-front__leaf-wrapper--2{top:-8vmin;transform:rotateY(-180deg) scale(0.7) !important;animation:flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important;}
    .flower__g-front__leaf-wrapper--3{top:-3vmin;animation:flower__g-front__leaf-ans 1s 4.6s ease-in backwards;}
    .flower__g-front__leaf-wrapper--4{top:-3vmin;transform:rotateY(-180deg) scale(0.9) !important;animation:flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important;}

    .flower__g-front__leaf-wrapper--7,.flower__g-front__leaf-wrapper--8{top:6.5vmin;}
    .flower__g-front__leaf-wrapper--2{animation-delay:5.2s !important;}
    .flower__g-front__leaf-wrapper--3{animation-delay:4.9s !important;}
    .flower__g-front__leaf-wrapper--5{animation-delay:4.3s !important;}
    .flower__g-front__leaf-wrapper--6{animation-delay:4.1s !important;}
    .flower__g-front__leaf-wrapper--7{animation-delay:3.8s !important;}
    .flower__g-front__leaf-wrapper--8{animation-delay:3.5s !important;}

    .flower__g-front__leaf {
      width:10vmin; height:10vmin;
      border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
      background-image:
        linear-gradient(to bottom left,transparent,var(--dark-color)),
        linear-gradient(to bottom right,#2e6b20 50%,transparent 50%);
      mask-image:linear-gradient(to bottom right,#1a4a10 50%,transparent 50%);

    /* =============================================
       HOJA FRONTAL GRANDE
    ============================================= */
    .flower__g-fr {
      position:absolute; bottom:-4vmin; left:0;
      transform-origin:bottom left; z-index:10;
      animation:flower__g-fr-ans 2s linear infinite;
    }
    .flower__g-fr .leaf {
      width:30vmin; height:50vmin;
      border-top-left-radius:100%;
      border-left:2vmin solid #1e5c14;
      -webkit-mask-image:linear-gradient(to top,transparent 25%,#1a4a10 50%);
      position:relative; z-index:1;
    }
    .flower__g-fr__leaf {
      position:absolute; top:0; left:0;
      width:10vmin; height:10vmin;
      border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
      background-image:
        linear-gradient(to bottom left,transparent,var(--dark-color) 98%),
        linear-gradient(to bottom right,#2e7a20 45%,transparent 50%);

    .flower__g-fr__leaf--2{left:12vmin;top:-7vmin;transform:rotate(25deg) rotateY(-180deg);animation:flower__g-fr-leaft-ans-6 0.5s 5.0s linear backwards;}
    .flower__g-fr__leaf--3{left:15vmin;top:6vmin;transform:rotate(55deg);animation:flower__g-fr-leaft-ans-5 0.5s 4.8s linear backwards;}
    .flower__g-fr__leaf--4{left:6vmin;top:-2vmin;transform:rotate(25deg) rotateY(-180deg);animation:flower__g-fr-leaft-ans-6 0.5s 4.6s linear backwards;}
    .flower__g-fr__leaf--5{left:10vmin;top:14vmin;transform:rotate(55deg);animation:flower__g-fr-leaft-ans-5 0.5s 4.4s linear backwards;}
    .flower__g-fr__leaf--6{left:0vmin;top:6vmin;transform:rotate(25deg) rotateY(-180deg);animation:flower__g-fr-leaft-ans-6 0.5s 4.2s linear backwards;}
    .flower__g-fr__leaf--7{left:5vmin;top:22vmin;transform:rotate(45deg);animation:flower__g-fr-leaft-ans-7 0.5s 4.0s linear backwards;}
    .flower__g-fr__leaf--8{left:-4vmin;top:15vmin;transform:rotate(15deg) rotateY(-180deg);animation:flower__g-fr-leaft-ans-8 0.5s 3.8s linear backwards;}

    /* =============================================
       PASTO LARGO
    ============================================= */
    .long-g {
      position:absolute; bottom:25vmin; left:-42vmin;
      transform-origin:bottom left;
    }
    .long-g--1{bottom:0;transform:scale(0.8) rotate(-5deg);}

    .long-g--1 .leaf--1{--w:5vmin;--h:60vmin;left:-2vmin;transform:rotate(3deg) rotateY(-180deg);}
    .long-g--2,.long-g--3{bottom:-3vmin;left:-35vmin;transform-origin:center;transform:scale(0.6) rotateX(60deg);}
    .long-g--2 .leaf,.long-g--3 .leaf{-webkit-mask-image:linear-gradient(to top,transparent 50%,#163d12 80%) !important;}
    .long-g--2 .leaf--1,.long-g--3 .leaf--1{left:-1vmin;transform:rotateY(-180deg);}
    .long-g--3{left:-17vmin;bottom:0;}
    .long-g--3 .leaf{-webkit-mask-image:linear-gradient(to top,transparent 40%,#1e4a18 80%) !important;}
    .long-g--4{left:25vmin;bottom:-3vmin;transform-origin:center;transform:scale(0.6) rotateX(60deg);}
    .long-g--4 .leaf{-webkit-mask-image:linear-gradient(to top,transparent 50%,#163d12 80%) !important;}
    .long-g--5{left:42vmin;bottom:0;transform:scale(0.8) rotate(2deg);}
    .long-g--6{left:0;bottom:-20vmin;z-index:100;filter:blur(0.3vmin);transform:scale(0.8) rotate(2deg);}
    .long-g--7{left:35vmin;bottom:20vmin;z-index:-1;filter:blur(0.3vmin);transform:scale(0.6) rotate(2deg);opacity:0.45;}
    .long-g .leaf {
      --w:15vmin; --h:40vmin; --c:#163d12;
      position:absolute; bottom:0;
      width:var(--w); height:var(--h);
      border-top-left-radius:100%;
      border-left:2vmin solid #124010;
      -webkit-mask-image:linear-gradient(to top,transparent 20%,var(--dark-color));
      transform-origin:bottom center;
      opacity:0.72;
    }
    .long-g .leaf--0{left:2vmin;animation:leaf-ans-1 4s linear infinite;}
    .long-g .leaf--1{--w:5vmin;--h:60vmin;animation:leaf-ans-1 4s linear infinite;}
    .long-g .leaf--2{--w:10vmin;--h:40vmin;left:-0.5vmin;bottom:5vmin;transform-origin:bottom left;transform:rotateY(-180deg);animation:leaf-ans-2 3s linear infinite;}
    .long-g .leaf--3{--w:5vmin;--h:30vmin;left:-1vmin;bottom:3.2vmin;transform-origin:bottom left;transform:rotate(-10deg) rotateY(-180deg);animation:leaf-ans-3 3s linear infinite;}

    /* =============================================
       SUELO — franja verde
    ============================================= */
    .ground {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 12vmin;
      background: linear-gradient(to top, #0a2206, #163d12, transparent);
      z-index: 5;
    }

    /* =============================================
       KEYFRAMES
    ============================================= */
    .grow-ans { animation:grow-ans 2s var(--d) backwards; }
    @keyframes grow-ans { 0%{transform:scale(0);opacity:0;} }
    .growing-grass { animation:growing-grass-ans 1s 2s backwards; }
    @keyframes growing-grass-ans { 0%{transform:scale(0);} }
    @keyframes leaf-ans-1 { 0%,100%{transform:rotate(-5deg) scale(1);}50%{transform:rotate(5deg) scale(1.1);} }
    @keyframes leaf-ans-2 { 0%,100%{transform:rotateY(-180deg) rotate(5deg);}50%{transform:rotateY(-180deg) rotate(0deg) scale(1.1);} }
    @keyframes leaf-ans-3 { 0%,100%{transform:rotate(-10deg) rotateY(-180deg);}50%{transform:rotate(-20deg) rotateY(-180deg);} }
    @keyframes light-ans {
      0%{opacity:0;transform:translateY(0);}
      25%{opacity:1;transform:translateY(-5vmin) translateX(-2vmin);}
      50%{opacity:1;transform:translateY(-15vmin) translateX(2vmin);filter:blur(0.2vmin);}
      75%{transform:translateY(-20vmin) translateX(-2vmin);filter:blur(0.2vmin);}
      100%{transform:translateY(-30vmin);opacity:0;filter:blur(1vmin);}
    }
    @keyframes moving-flower-1 { 0%,100%{transform:rotate(2deg);}50%{transform:rotate(-2deg);} }
    @keyframes moving-flower-2 { 0%,100%{transform:rotate(18deg);}50%{transform:rotate(14deg);} }
    @keyframes moving-flower-3 { 0%,100%{transform:rotate(-18deg);}50%{transform:rotate(-20deg) rotateY(-10deg);} }
    @keyframes blooming-leaf-right { 0%{transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(0);} }
    @keyframes blooming-leaf-left  { 0%{transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(0);} }
    @keyframes grow-flower-tree    { 0%{height:0;border-radius:1vmin;} }
    @keyframes blooming-flower     { 0%{transform:scale(0);} }
    @keyframes moving-grass        { 0%,100%{transform:rotate(-48deg) rotateY(40deg);}50%{transform:rotate(-50deg) rotateY(40deg);} }
    @keyframes moving-grass--2     { 0%,100%{transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);}50%{transform:scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg);} }
    @keyframes flower-g-long-ans   { 0%,100%{transform:rotate(-30deg) rotateY(-20deg);}50%{transform:rotate(-32deg) rotateY(-20deg);} }
    @keyframes flower-g-right-ans  { 0%,100%{transform:rotate(20deg);}50%{transform:rotate(24deg) rotateX(-20deg);} }
    @keyframes flower-g-right-ans--2 { 0%,100%{transform:rotateY(-180deg) rotate(0deg) rotateX(-20deg);}50%{transform:rotateY(-180deg) rotate(6deg) rotateX(-20deg);} }
    @keyframes flower__g-front-ans { 0%,100%{transform:rotate(-28deg) rotateY(30deg) scale(1.04);}50%{transform:rotate(-35deg) rotateY(40deg) scale(1.04);} }
    @keyframes flower__g-fr-ans    { 0%,100%{transform:rotate(2deg);}50%{transform:rotate(4deg);} }
    @keyframes flower__g-fr-leaft-ans-1 { 0%{transform-origin:left;transform:rotate(45deg) scale(0);} }
    @keyframes flower__g-fr-leaft-ans-5 { 0%{transform-origin:left;transform:rotate(55deg) scale(0);} }
    @keyframes flower__g-fr-leaft-ans-6 { 0%{transform-origin:right;transform:rotate(25deg) rotateY(-180deg) scale(0);} }
    @keyframes flower__g-fr-leaft-ans-7 { 0%{transform-origin:left;transform:rotate(45deg) scale(0);} }
    @keyframes flower__g-fr-leaft-ans-8 { 0%{transform-origin:right;transform:rotate(15deg) rotateY(-180deg) scale(0);} }
    @keyframes flower__g-front__leaf-left-ans-2 { 0%{transform:rotateY(-180deg) scale(0);} }
    @keyframes flower__g-front__leaf-ans        { 0%{transform:rotate(10deg) scale(0);} }
    @keyframes flower__g-front__leaf-left-ans   { 0%{transform:rotateY(-180deg) rotate(5deg) scale(0);} }

    @keyframes bg-sway { 0%,100%{transform:var(--sway-base);}50%{transform:var(--sway-mid);} }
  </style>

  <script>
    // =============================================
    // GENERADOR DE JARDÍN DE FONDO
    // =============================================
    const bgColors = [
      // [petal1-2-3 gradient, sepal gradient]
      ['#7a0000','#cc0011','#ff3355',   '#8a5a00','#ffcc44'],  // rojo
      ['#8a5a00','#d49000','#ffe033',   '#8a5a00','#fff176'],  // amarillo
      ['#999','#ddd','#fff',            '#c89000','#ffe066'],  // blanco
      ['#8b0050','#cc0088','#ff66bb',   '#b89000','#ffe066'],  // rosa
      ['#3a0070','#8800cc','#cc55ff',   '#b89000','#ffe066'],  // morado
      ['#7a2200','#d04400','#ff7700',   '#b89000','#ffe066'],  // naranja
      ['#006070','#00aacc','#88eeff',   '#b89000','#ffe066'],  // cyan
    ];

    const garden = document.getElementById('bgGarden');
    const viewW = window.innerWidth;

    // Generar filas de profundidad: fila trasera, media, frontal
    const rows = [
      { count: 28, bottom: '32%', scale: 0.32, opacity: 0.18, blur: 4,  stemH: 38, cupW: 14, petalW: 8, petalH: 16 },
      { count: 22, bottom: '18%', scale: 0.45, opacity: 0.28, blur: 2.5,stemH: 52, cupW: 18, petalW:10, petalH: 20 },
      { count: 16, bottom: '6%',  scale: 0.62, opacity: 0.38, blur: 1.5,stemH: 68, cupW: 22, petalW:12, petalH: 24 },
    ];

    rows.forEach((row, ri) => {
      for (let i = 0; i < row.count; i++) {
        const col = bgColors[Math.floor(Math.random() * bgColors.length)];
        const swayDur = 3 + Math.random() * 3;
        const swayDelay = Math.random() * 3;
        const tilt = (Math.random() - 0.5) * 22;
        const xPos = (i / row.count * 100) + (Math.random() - 0.5) * (100 / row.count);

        const wrapper = document.createElement('div');
        wrapper.className = 'bg-tulip';
        wrapper.style.cssText = `
          left: ${xPos}%;
          bottom: ${row.bottom};
          transform-origin: bottom center;
          filter: blur(${row.blur}px);
          opacity: ${row.opacity};
          animation: bg-sway ${swayDur}s ${swayDelay}s ease-in-out infinite;
          --sway-base: rotate(${tilt}deg);
          --sway-mid: rotate(${tilt + (Math.random()>0.5?2:-2)}deg);
        `;

        // Copa (pétalos)
        const cup = document.createElement('div');
        cup.className = 'bg-tulip__cup';
        cup.style.width = row.cupW + 'px';
        cup.style.height = row.petalH + 'px';
        cup.style.position = 'relative';

        for (let p = 1; p <= 3; p++) {
          const petal = document.createElement('div');
          petal.className = `bg-tulip__petal bg-tulip__petal--${p}`;
          petal.style.cssText = `
            width: ${row.petalW}px;
            height: ${row.petalH}px;
            background-image: linear-gradient(to top, ${col[0]}, ${col[1]}, ${col[2]});
            box-shadow: 0 0 ${3 + ri}px ${col[2]}, inset 0 0 ${2+ri}px rgba(255,255,255,0.15);
            outline: ${0.8 + ri*0.3}px solid ${col[2]}80;
          `;
          cup.appendChild(petal);
        }

        // Tallo
        const stem = document.createElement('div');
        stem.className = 'bg-tulip__stem';
        stem.style.height = row.stemH + 'px';

        wrapper.appendChild(cup);
        wrapper.appendChild(stem);
        garden.appendChild(wrapper);
      }
    });
  </script>
